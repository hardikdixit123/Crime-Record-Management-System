{% extends "base.html" %}
{% block title %}Register Crime{% endblock %}

{% block content %}
<h3 class="mb-4">Register New Crime</h3>

<form method="POST" class="row g-3">
    <div class="col-md-4">
        <label class="form-label">FIR Number *</label>
        <input type="text" name="fir_number" class="form-control" required>
    </div>

    <div class="col-md-8">
        <label class="form-label">Title *</label>
        <input type="text" name="title" class="form-control" required>
    </div>

    <div class="col-12">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="3"></textarea>
    </div>

    <div class="col-md-4">
        <label class="form-label">Police Station</label>
        <input type="text" name="police_station" class="form-control">
    </div>

    <div class="col-md-4">
        <label class="form-label">District</label>
        <input type="text" name="district" class="form-control">
    </div>

    <div class="col-md-4">
        <label class="form-label">State</label>
        <input type="text" name="state" class="form-control" value="Uttar Pradesh">
    </div>

    <div class="col-md-3">
        <label class="form-label">Crime Date</label>
        <input type="date" name="crime_date" class="form-control">
    </div>

    <div class="col-md-3">
        <label class="form-label">Reported Date</label>
        <input type="date" name="reported_date" class="form-control">
    </div>

    <div class="col-md-3">
        <label class="form-label">Primary Section (IPC etc.) *</label>
        <select name="primary_law_id" class="form-select" required>
            <option value="">-- Select --</option>
            {% for sec in law_sections %}
                <option value="{{ sec.law_id }}">
                    {{ sec.code }} {{ sec.section_no }} - {{ sec.offence_name }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="col-md-3">
        <label class="form-label">Status</label>
        <select name="status" class="form-select">
            {% for st in case_statuses %}
                <option value="{{ st }}" {% if st == 'REGISTERED' %}selected{% endif %}>
                    {{ st }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="col-12 d-flex justify-content-end mt-3">
        <a href="{{ url_for('crimes_list') }}" class="btn btn-secondary me-2">Cancel</a>
        <button type="submit" class="btn btn-primary">Save</button>
    </div>
</form>
{% endblock %}
