{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}

{% block content %}
<h3 class="mb-4">Welcome, {{ username }} 👮</h3>

<div class="row">
    <div class="col-md-4">
        <div class="card mb-3">
            <div class="card-body">
                <h6>Total Crimes</h6>
                <h2>{{ total_crimes }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card mb-3">
            <div class="card-body">
                <h6>Under Investigation</h6>
                <h2>{{ under_investigation }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card mb-3">
            <div class="card-body">
                <h6>Closed / Convicted / Acquitted</h6>
                <h2>{{ closed_cases }}</h2>
            </div>
        </div>
    </div>
</div>

<div class="mt-4">
    <a href="{{ url_for('crimes_list') }}" class="btn btn-primary">
        Go to Crimes Module
    </a>
</div>
{% endblock %}
